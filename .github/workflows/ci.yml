name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and verify
        run: mvn -B -ntp clean verify -Dsurefire.excludes="**/MenuControllerTest.java,**/SlideViewerComponentTest.java,**/SlideViewerFrameTest.java"

      - name: Prepare deployable JAR
        run: |
          mkdir -p dist
          JAR_FILE="$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*sources.jar' ! -name '*javadoc.jar' | head -n 1)"
          test -n "$JAR_FILE"
          cp "$JAR_FILE" dist/jabberpoint.jar

      - name: Upload deployable artifact
        uses: actions/upload-artifact@v4
        with:
          name: jabberpoint-jar
          path: dist/jabberpoint.jar
          if-no-files-found: error
          retention-days: 30

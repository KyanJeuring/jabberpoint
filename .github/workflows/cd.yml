name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      promote_to:
        description: 'Target environment'
        required: true
        default: 'acceptance'
        type: choice
        options:
          - acceptance
          - production
      run_id:
        description: 'CI workflow run ID to promote'
        required: true
        type: string

concurrency:
  group: cd-${{ github.event_name }}-${{ github.event.workflow_run.id || inputs.promote_to }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  ARTIFACT_NAME: jabberpoint-jar
  REMOTE_JAR_NAME: jabberpoint.jar

jobs:
  development:
    name: Development
    if: >
      ${{
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'dev'
      }}
    runs-on: ubuntu-latest
    environment: development
    env:
      REMOTE_APP_DIR: /opt/jabberpoint/development

    steps:
      - name: Download artifact
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const { owner, repo } = context.repo;

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id
            });

            const artifact = artifacts.data.artifacts.find(a => a.name === process.env.ARTIFACT_NAME);
            if (!artifact) {
              core.setFailed(`Artifact '${process.env.ARTIFACT_NAME}' not found for run ${run_id}`);
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: artifact.id,
              archive_format: 'zip'
            });

            const fs = require('fs');
            fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/artifact.zip`, Buffer.from(download.data));

      - name: Unpack artifact
        run: |
          mkdir -p dist
          unzip -o artifact.zip -d dist
          ls -la dist

      - name: Development
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/id_ed25519 -P "${{ secrets.SSH_PORT }}" "dist/${REMOTE_JAR_NAME}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/development-${REMOTE_JAR_NAME}"

          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            sudo mkdir -p ${REMOTE_APP_DIR} &&
            sudo mv /tmp/development-${REMOTE_JAR_NAME} ${REMOTE_APP_DIR}/${REMOTE_JAR_NAME} &&
            ls -l ${REMOTE_APP_DIR}/${REMOTE_JAR_NAME}
          "

  test:
    name: Test
    if: >
      ${{
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    environment: test
    env:
      REMOTE_APP_DIR: /opt/jabberpoint/test

    steps:
      - name: Download artifact
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const { owner, repo } = context.repo;

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id
            });

            const artifact = artifacts.data.artifacts.find(a => a.name === process.env.ARTIFACT_NAME);
            if (!artifact) {
              core.setFailed(`Artifact '${process.env.ARTIFACT_NAME}' not found for run ${run_id}`);
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: artifact.id,
              archive_format: 'zip'
            });

            const fs = require('fs');
            fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/artifact.zip`, Buffer.from(download.data));

      - name: Unpack artifact
        run: |
          mkdir -p dist
          unzip -o artifact.zip -d dist
          ls -la dist

      - name: Test
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/id_ed25519 -P "${{ secrets.SSH_PORT }}" "dist/${REMOTE_JAR_NAME}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/test-${REMOTE_JAR_NAME}"

          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            sudo mkdir -p ${REMOTE_APP_DIR} &&
            sudo mv /tmp/test-${REMOTE_JAR_NAME} ${REMOTE_APP_DIR}/${REMOTE_JAR_NAME} &&
            ls -l ${REMOTE_APP_DIR}/${REMOTE_JAR_NAME}
          "

  acceptance:
    name: Acceptance
    if: >
      ${{
        github.event_name == 'workflow_dispatch' &&
        inputs.promote_to == 'acceptance'
      }}
    runs-on: ubuntu-latest
    environment: acceptance
    env:
      REMOTE_APP_DIR: /opt/jabberpoint/acceptance

    steps:
      - name: Download artifact
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = Number('${{ inputs.run_id }}');
            const { owner, repo } = context.repo;

            const run = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id
            });

            if (run.data.conclusion !== 'success') {
              core.setFailed(`CI run ${run_id} is not successful.`);
              return;
            }

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id
            });

            const artifact = artifacts.data.artifacts.find(a => a.name === process.env.ARTIFACT_NAME);
            if (!artifact) {
              core.setFailed(`Artifact '${process.env.ARTIFACT_NAME}' not found for run ${run_id}`);
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: artifact.id,
              archive_format: 'zip'
            });

            const fs = require('fs');
            fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/artifact.zip`, Buffer.from(download.data));

      - name: Unpack artifact
        run: |
          mkdir -p dist
          unzip -o artifact.zip -d dist
          ls -la dist

      - name: Acceptance
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/id_ed25519 -P "${{ secrets.SSH_PORT }}" "dist/${REMOTE_JAR_NAME}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/acceptance-${REMOTE_JAR_NAME}"

          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            sudo mkdir -p ${REMOTE_APP_DIR} &&
            sudo mv /tmp/acceptance-${REMOTE_JAR_NAME} ${REMOTE_APP_DIR}/${REMOTE_JAR_NAME} &&
            ls -l ${REMOTE_APP_DIR}/${REMOTE_JAR_NAME}
          "

  production:
    name: Production
    if: >
      ${{
        github.event_name == 'workflow_dispatch' &&
        inputs.promote_to == 'production'
      }}
    runs-on: ubuntu-latest
    environment: production
    env:
      REMOTE_APP_DIR: /opt/jabberpoint/production

    steps:
      - name: Download artifact
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = Number('${{ inputs.run_id }}');
            const { owner, repo } = context.repo;

            const run = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id
            });

            if (run.data.conclusion !== 'success') {
              core.setFailed(`CI run ${run_id} is not successful.`);
              return;
            }

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id
            });

            const artifact = artifacts.data.artifacts.find(a => a.name === process.env.ARTIFACT_NAME);
            if (!artifact) {
              core.setFailed(`Artifact '${process.env.ARTIFACT_NAME}' not found for run ${run_id}`);
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: artifact.id,
              archive_format: 'zip'
            });

            const fs = require('fs');
            fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/artifact.zip`, Buffer.from(download.data));

      - name: Unpack artifact
        run: |
          mkdir -p dist
          unzip -o artifact.zip -d dist
          ls -la dist

      - name: Production
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/id_ed25519 -P "${{ secrets.SSH_PORT }}" "dist/${REMOTE_JAR_NAME}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/production-${REMOTE_JAR_NAME}"

          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            sudo mkdir -p ${REMOTE_APP_DIR} &&
            sudo mv /tmp/production-${REMOTE_JAR_NAME} ${REMOTE_APP_DIR}/${REMOTE_JAR_NAME} &&
            ls -l ${REMOTE_APP_DIR}/${REMOTE_JAR_NAME}
          "
